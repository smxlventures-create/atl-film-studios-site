<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Admin Dashboard — ATL Film Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260603-warm-light">
  <style>
    /* Admin specific styles */
    body {
      background-color: #0c0c0c;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .admin-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 100px); /* Adjust based on header height */
      position: relative;
    }

    .admin-header {
      background-color: #121212;
      border-bottom: 1px solid #222222;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .admin-logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #ffffff;
    }

    .admin-logo-img {
      height: 45px;
      width: auto;
    }

    .admin-title-badge {
      background-color: #e5a93c;
      color: #000000;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .admin-nav {
      display: flex;
      gap: 15px;
    }

    .admin-nav-btn {
      background-color: transparent;
      color: #aaaaaa;
      border: 1px solid #333333;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .admin-nav-btn:hover {
      background-color: #222222;
      color: #ffffff;
      border-color: #444444;
    }

    .admin-nav-btn.primary {
      background-color: #e5a93c;
      color: #000000;
      border-color: #e5a93c;
    }

    .admin-nav-btn.primary:hover {
      background-color: #f0be5e;
      border-color: #f0be5e;
    }

    .iframe-wrapper {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background-color: #111111;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Full screen adjustment to fit nicely */
    html, body {
      height: 100%;
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <a href="index.html" class="admin-logo-link">
      <img src="photos/atl-film-studios-logo-2025.png" alt="ATL Film Studios" class="admin-logo-img">
      <span style="font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 1.1rem; letter-spacing: -0.02em;">ATL FILM STUDIOS</span>
      <span class="admin-title-badge">CRM Backend</span>
    </a>
    <div class="admin-nav">
      <a href="index.html" class="admin-nav-btn">Public Site</a>
      <a href="https://airtable.com/app1RrZATZ37l4xCP" target="_blank" class="admin-nav-btn">Airtable Base</a>
      <a href="https://zapier.com" target="_blank" class="admin-nav-btn">Zapier</a>
    </div>
  </header>

  <div class="admin-container">
    <div class="iframe-wrapper">
      <!-- Airtable Interface Designer Embed -->
      <iframe src="https://airtable.com/app1RrZATZ37l4xCP/shr7efrEmuaDvE4ya/embed" allowfullscreen></iframe>
    </div>
  </div>
</body>
</html>
